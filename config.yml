baseURL: "https://sbomit.dev/"
title: SBOMit
paginate: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

## googleAnalytics:

minify:
  disableXML: true
  minifyOutput: false

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: SBOMit
  description: "SBOMit enriches SBOMs with build-time attestations from Witness (in-toto), producing accurate, verifiable, tamper-evident software component inventories."
  keywords: ["Software Bill of Materials", "SBOM", "in-toto", "attestation", "supply chain security", "Witness", "SPDX", "CycloneDX"]
  author: "SBOMit Maintainers"
  ## images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "January 2, 2006"
  defaultTheme: dark
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    ## favicon: "<link / abs url>"
    ## favicon16x16: "<link / abs url>"
    ## favicon32x32: "<link / abs url>"
    ## apple_touch_icon: "<link / abs url>"
    ## safari_pinned_tab: "<link / abs url>"

  ## label:
    ## text: "Home"
    ## icon: /apple-touch-icon.png
    ## iconHeight: 35

  # home-info mode
  homeInfoParams:
    Title: "SBOMit — Treat SBOMs as part of your defense, not a checkbox"
    Additional: |
      ### Community & Meetings

      - **Meetings**: Wednesdays at 11 AM EST — [Zoom link](https://zoom-lfx.platform.linuxfoundation.org/meeting/94671938246?password=035ca9e9-5194-491c-863b-69b21a596c67)
      - **Meeting notes**: [Google Docs](https://docs.google.com/document/d/1-nHXMqvWNzgOxAq08O8Wu2BTHz0U60yBoAklrJAMaRc/edit?usp=sharing)
      - **Slack**: [#sbomit on OpenSSF Slack](https://openssf.slack.com/channels/sbomit)

  socialIcons:
    - name: github
      url: "https://github.com/SBOMit/sbomit"

  analytics:
    google:
      SiteVerificationTag: "XYZabc"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: "https://github.com/sbomit/website/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: getting-started
      name: Getting Started
      url: /getting-started/
      weight: 5
    - identifier: tool
      name: Tool
      url: https://github.com/SBOMit/sbomit
      weight: 10
    - identifier: witness
      name: Witness
      url: https://github.com/in-toto/witness
      weight: 15
    - identifier: specification
      name: Specification
      url: https://github.com/SBOMit/specification
      weight: 20
    - identifier: faq
      name: FAQ
      url: /faq/
      weight: 30
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
